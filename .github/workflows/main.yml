name: FER Manual & Auto Pipeline

on:
  # This enables the manual trigger button in GitHub Actions
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'Testing new model version'

  # This keeps the automation on every push to master
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Recognition Test
        # This acts as your "manual" verification
        run: python -c "import cv2; import tensorflow; print('Libraries and OpenCV loaded successfully')"
      - name: Trigger Web Deployment
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "Error: RENDER_DEPLOY_HOOK_URL is not set in GitHub Secrets"
            exit 1
          fi

     
